# Nomina configuration (TOML). All values shown are defaults unless noted.
# Copy to nomina.toml and pass with `--config nomina.toml`.
#
# Listen sockets, TLS, and privilege settings live here (changing them needs a
# restart). Zones, records, views, forwarders, blocklists, rules and rewrites are
# managed at runtime through the web UI / API and stored in the database.

# Directory for the database and the generated self-signed TLS certificate.
data_dir = "./data"

# Optional explicit database path (defaults to <data_dir>/nomina.db).
# database_path = "/var/lib/nomina/nomina.db"

# tracing log filter, e.g. "info", "nomina=debug,warn".
log = "info"

[dns]
# Plain DNS (UDP + TCP). Bind to specific IPs to control reachability, e.g.
# ["192.168.1.2:53"]. IPv6 listeners are bound v6-only, so to serve BOTH
# protocols list both wildcards: ["0.0.0.0:53", "[::]:53"].
listen = ["0.0.0.0:53"]
# DNS-over-TLS (RFC 7858). Requires TLS material. Empty = disabled.
dot_listen = []        # e.g. ["0.0.0.0:853"]
# DNS-over-HTTPS (RFC 8484, GET + POST). Requires TLS material. Empty = disabled.
doh_listen = []        # e.g. ["0.0.0.0:443"]
# DNS-over-QUIC (RFC 9250, UDP). Requires TLS material. Empty = disabled.
doq_listen = []        # e.g. ["0.0.0.0:853"]
# DNS-over-HTTP/3 (UDP). Requires TLS material. Empty = disabled.
doh3_listen = []       # e.g. ["0.0.0.0:443"]
doh_path = "/dns-query"
tcp_timeout_secs = 10

[web]
# Management UI + API. Bind to a LAN/loopback IP to keep it off the public net,
# e.g. "127.0.0.1:8053" or "192.168.1.2:8053".
listen = "0.0.0.0:8053"
# Serve the management interface (and co-located DoH) over HTTPS.
tls = false
# Disable the management interface entirely (DNS-only deployment).
disabled = false
# Optional CIDR allow-list for the management server (defense-in-depth on top of
# the bind address). Empty = allow all that can reach the socket.
allow_networks = []    # e.g. ["192.168.0.0/16", "10.0.0.0/8"]

[tls]
# Provide your own certificate, or leave unset to auto-generate a self-signed one
# under data_dir (shared by the web UI, DoT, and DoH).
# cert_path = "/etc/nomina/cert.pem"
# key_path  = "/etc/nomina/key.pem"
hostname = "nomina.local"
auto_self_signed = true
# Automatic Let's Encrypt certificates via ACME TLS-ALPN-01. Requires
# `web.tls = true`, the domain(s) to resolve publicly to this host, and the TLS
# port reachable from the internet (typically 443). Certs cache in data_dir/acme.
# acme = true
# acme_domains = ["dns.example.com"]   # defaults to [hostname] if empty
# acme_contact = "admin@example.com"
# acme_staging = false                 # true = Let's Encrypt staging (testing)

[privileges]
# Bind privileged ports as root, then drop to this user/group. Only effective
# when started as root on Unix. The data_dir must be writable by this user.
# user = "nomina"
# group = "nomina"

[geo]
# Optional GeoIP databases (user-supplied; not redistributed). When set, the Map
# view plots resolved IPs, views can match clients by country/continent/ASN
# (GeoDNS), and `blocked_asns` can reject traffic by autonomous system. Two free
# MMDB sources work:
#   - DB-IP "lite" — NO account/key needed: https://db-ip.com/db/lite.php
#   - MaxMind GeoLite2 — free account required: https://www.maxmind.com/
# geoip_db = "/etc/nomina/dbip-city.mmdb"   # or GeoLite2-City.mmdb
# asn_db   = "/etc/nomina/dbip-asn.mmdb"    # or GeoLite2-ASN.mmdb

[dhcp]
# Built-in DHCP server. Disabled by default: with both lists empty, no DHCP
# sockets are bound and no serving loops run. Scopes, reservations, and options
# are managed at runtime (database), not here — only the listen sockets are
# startup config.
#
# Binding the well-known ports (67 for DHCPv4, 547 for the DHCPv6 server)
# requires root or CAP_NET_BIND_SERVICE. Sockets are bound while privileged and
# the server runs after privilege drop, just like the DNS listeners.
#
# DHCPv4 listeners are bound broadcast-capable (replies to un-relayed clients go
# to 255.255.255.255:68). DHCPv6 listeners are IPv6-only; the v6 server listens
# on 547 and replies to clients on 546. DHCP relay (giaddr / RELAY-FORW) is
# served for v4 by selecting the scope whose subnet contains giaddr; v6 relay is
# not handled (same-link clients only).
# v4_listen = ["0.0.0.0:67"]
# v6_listen = ["[::]:547"]

# mDNS discovery (discover *.local LAN hosts and republish them under a zone you
# choose) is configured at runtime in the web UI under Settings -> mDNS, not here.
