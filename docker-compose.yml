services:
  nomina:
    build: .
    # image: ghcr.io/datanoisetv/nomina:latest   # once published
    container_name: nomina
    restart: unless-stopped
    # host networking is simplest for a DNS/DHCP server (real client IPs, broadcast
    # DHCP). Drop it and use explicit port maps if you don't need DHCP.
    network_mode: host
    # DHCP per-interface binding (SO_BINDTODEVICE) and privileged ports.
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
    volumes:
      - nomina-data:/data
      # - ./nomina.toml:/etc/nomina/nomina.toml:ro   # to override the config
      # - ./geo:/data/geo:ro                         # GeoIP databases

volumes:
  nomina-data:
